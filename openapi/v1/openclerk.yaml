openapi: 3.0.3
info:
  title: OpenClerk Agent Store API
  version: 0.1.0
  description: Contract-first local document store API for agent-facing retrieval and document operations.
servers:
  - url: http://127.0.0.1:8080
tags:
  - name: system
  - name: documents
  - name: search
  - name: graph
  - name: records
paths:
  /v1/capabilities:
    get:
      operationId: getCapabilities
      tags: [system]
      summary: Get backend capabilities
      responses:
        "200":
          description: Backend capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/search/query:
    post:
      operationId: searchQuery
      tags: [search]
      summary: Search indexed content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchQuery"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/documents:
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a canonical markdown document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentRequest"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/documents/{docId}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a canonical document
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/documents/{docId}:append:
    post:
      operationId: appendDocument
      tags: [documents]
      summary: Append markdown content to a canonical document
      parameters:
        - $ref: "#/components/parameters/DocId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppendDocumentRequest"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/documents/{docId}:replace-section:
    post:
      operationId: replaceDocumentSection
      tags: [documents]
      summary: Replace one heading-scoped section in a canonical document
      parameters:
        - $ref: "#/components/parameters/DocId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceSectionRequest"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/chunks/{chunkId}:
    get:
      operationId: getChunk
      tags: [documents]
      summary: Get an indexed chunk
      parameters:
        - $ref: "#/components/parameters/ChunkId"
      responses:
        "200":
          description: Chunk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chunk"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/extensions/graph/neighborhood:
    post:
      operationId: graphNeighborhood
      tags: [graph]
      summary: Get an evidence-linked graph neighborhood
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphNeighborhoodRequest"
      responses:
        "200":
          description: Graph neighborhood
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphNeighborhoodResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/extensions/records/lookup:
    post:
      operationId: recordsLookup
      tags: [records]
      summary: Lookup promoted records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordsLookupRequest"
      responses:
        "200":
          description: Records lookup response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordsLookupResponse"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /v1/extensions/records/entities/{entityId}:
    get:
      operationId: getRecordEntity
      tags: [records]
      summary: Get one promoted entity
      parameters:
        - $ref: "#/components/parameters/EntityId"
      responses:
        "200":
          description: Record entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordEntity"
        default:
          $ref: "#/components/responses/ErrorResponse"
components:
  parameters:
    DocId:
      name: docId
      in: path
      required: true
      schema:
        type: string
    ChunkId:
      name: chunkId
      in: path
      required: true
      schema:
        type: string
    EntityId:
      name: entityId
      in: path
      required: true
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Capabilities:
      type: object
      additionalProperties: false
      required:
        - backend
        - authMode
        - searchModes
        - extensions
      properties:
        backend:
          type: string
          enum: [fts, hybrid, graph, records]
        authMode:
          type: string
          enum: [none]
        searchModes:
          type: array
          items:
            type: string
            enum: [lexical, vector, hybrid]
        extensions:
          type: array
          items:
            type: string
            enum: [graph, records]
    Document:
      type: object
      additionalProperties: false
      required:
        - docId
        - path
        - title
        - body
        - headings
        - createdAt
        - updatedAt
      properties:
        docId:
          type: string
        path:
          type: string
        title:
          type: string
        body:
          type: string
        headings:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Chunk:
      type: object
      additionalProperties: false
      required:
        - chunkId
        - docId
        - path
        - heading
        - content
        - lineStart
        - lineEnd
      properties:
        chunkId:
          type: string
        docId:
          type: string
        path:
          type: string
        heading:
          type: string
        content:
          type: string
        lineStart:
          type: integer
        lineEnd:
          type: integer
    SearchQuery:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        cursor:
          type: string
    SearchResponse:
      type: object
      additionalProperties: false
      required:
        - hits
        - pageInfo
      properties:
        hits:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"
        pageInfo:
          $ref: "#/components/schemas/PageInfo"
    SearchHit:
      type: object
      additionalProperties: false
      required:
        - rank
        - score
        - docId
        - chunkId
        - title
        - snippet
        - citations
      properties:
        rank:
          type: integer
        score:
          type: number
          format: double
        docId:
          type: string
        chunkId:
          type: string
        title:
          type: string
        snippet:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
    Citation:
      type: object
      additionalProperties: false
      required:
        - docId
        - chunkId
        - path
        - lineStart
        - lineEnd
      properties:
        docId:
          type: string
        chunkId:
          type: string
        path:
          type: string
        heading:
          type: string
        lineStart:
          type: integer
        lineEnd:
          type: integer
    PageInfo:
      type: object
      additionalProperties: false
      required:
        - hasMore
      properties:
        nextCursor:
          type: string
        hasMore:
          type: boolean
    CreateDocumentRequest:
      type: object
      additionalProperties: false
      required:
        - path
        - title
        - body
      properties:
        path:
          type: string
        title:
          type: string
        body:
          type: string
    AppendDocumentRequest:
      type: object
      additionalProperties: false
      required:
        - content
      properties:
        content:
          type: string
    ReplaceSectionRequest:
      type: object
      additionalProperties: false
      required:
        - heading
        - content
      properties:
        heading:
          type: string
        content:
          type: string
    GraphNeighborhoodRequest:
      type: object
      additionalProperties: false
      properties:
        docId:
          type: string
        chunkId:
          type: string
        nodeId:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    GraphNeighborhoodResponse:
      type: object
      additionalProperties: false
      required:
        - nodes
        - edges
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
    GraphNode:
      type: object
      additionalProperties: false
      required:
        - nodeId
        - type
        - label
        - citations
      properties:
        nodeId:
          type: string
        type:
          type: string
          enum: [document, chunk, heading, entity]
        label:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
    GraphEdge:
      type: object
      additionalProperties: false
      required:
        - edgeId
        - fromNodeId
        - toNodeId
        - kind
        - citations
      properties:
        edgeId:
          type: string
        fromNodeId:
          type: string
        toNodeId:
          type: string
        kind:
          type: string
          enum: [links_to, mentions, cites]
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
    RecordsLookupRequest:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string
        entityType:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        cursor:
          type: string
    RecordsLookupResponse:
      type: object
      additionalProperties: false
      required:
        - entities
        - pageInfo
      properties:
        entities:
          type: array
          items:
            $ref: "#/components/schemas/RecordEntity"
        pageInfo:
          $ref: "#/components/schemas/PageInfo"
    RecordEntity:
      type: object
      additionalProperties: false
      required:
        - entityId
        - entityType
        - name
        - summary
        - facts
        - citations
        - updatedAt
      properties:
        entityId:
          type: string
        entityType:
          type: string
        name:
          type: string
        summary:
          type: string
        facts:
          type: array
          items:
            $ref: "#/components/schemas/RecordFact"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        updatedAt:
          type: string
          format: date-time
    RecordFact:
      type: object
      additionalProperties: false
      required:
        - key
        - value
      properties:
        key:
          type: string
        value:
          type: string
        observedAt:
          type: string
          format: date-time
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - retryable
        - requestId
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        retryable:
          type: boolean
        requestId:
          type: string
