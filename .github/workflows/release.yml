name: Release

on:
  push:
    tags:
      - "v*"
      - "ollama-embeddings/v*"
      - "gemini-embeddings/v*"
      - "tesseract-ocr/v*"

jobs:
  verify-release:
    name: Verify release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Validate release notes and changelog
        if: startsWith(github.ref_name, 'v')
        run: ./scripts/validate-release-docs.sh "${GITHUB_REF_NAME}"

      - name: Validate committed artifacts
        run: ./scripts/validate-committed-artifacts.sh

      - name: Validate Agent Skills
        run: ./scripts/validate-all-agent-skills.sh

      - name: Check formatting
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Run tests
        run: go test ./...

      - name: Run golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4 run

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify-release
    environment:
      name: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Prepare release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            archive="openclerk_${version}_source.tar.gz"
            skill="openclerk_${version}_skill.tar.gz"
            checksum="openclerk_${version}_checksums.txt"
            sbom="openclerk_${version}_sbom.json"
            installer="install.sh"
            notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
            assets_json="$(printf '%s\n' \
              "${installer}" \
              "${checksum}" \
              "openclerk_${version}_darwin_amd64.tar.gz" \
              "openclerk_${version}_darwin_arm64.tar.gz" \
              "openclerk_${version}_linux_amd64.tar.gz" \
              "openclerk_${version}_linux_arm64.tar.gz" \
              "${sbom}" \
              "${skill}" \
              "${archive}" \
              | jq -R . | jq -cs .)"
          else
            module="${GITHUB_REF_NAME%%/v*}"
            version="${GITHUB_REF_NAME##*/}"
            asset_version="${version#v}"
            prefix="openclerk-module-${module}_${asset_version}"
            archive="${prefix}_source.tar.gz"
            skill="${prefix}_skill.tar.gz"
            checksum="${prefix}_checksums.txt"
            sbom="${prefix}_sbom.json"
            installer="install-module.sh"
            notes_file="dist/.release-notes.md"
            assets_json="$(printf '%s\n' \
              "${installer}" \
              "${checksum}" \
              "${prefix}_darwin_amd64.tar.gz" \
              "${prefix}_darwin_arm64.tar.gz" \
              "${prefix}_linux_amd64.tar.gz" \
              "${prefix}_linux_arm64.tar.gz" \
              "${sbom}" \
              "${skill}" \
              "${archive}" \
              | jq -R . | jq -cs .)"
            echo "module=${module}" >> "${GITHUB_OUTPUT}"
          fi

          {
            echo "archive=${archive}"
            echo "skill=${skill}"
            echo "checksum=${checksum}"
            echo "sbom=${sbom}"
            echo "installer=${installer}"
            echo "notes_file=${notes_file}"
            echo "assets_json=${assets_json}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build release assets
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            bash ./scripts/build-release-bundle.sh "${GITHUB_REF_NAME}" dist
          else
            module="${GITHUB_REF_NAME%%/v*}"
            version="${GITHUB_REF_NAME##*/}"
            bash ./scripts/build-module-release-bundle.sh "${module}" "${version}" dist
            {
              echo "# ${module} ${version}"
              echo ""
              echo "Module-only OpenClerk release for ${module}."
              echo ""
              echo "Use install-module.sh from this release to install or upgrade the module package, then refresh registration with openclerk module."
            } > dist/.release-notes.md
          fi

      - name: Create draft GitHub Release from tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="${{ steps.meta.outputs.notes_file }}"
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft 2>/dev/null || true)"
          if [ -n "${release_json}" ]; then
            is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
            if [ "${is_draft}" != "true" ]; then
              echo "Release ${GITHUB_REF_NAME} already exists and is not a draft; refusing to mutate a published release." >&2
              exit 1
            fi
            echo "Release already exists for ${GITHUB_REF_NAME}"
            gh release edit "${GITHUB_REF_NAME}" --notes-file "${notes_file}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --verify-tag \
              --notes-file "${notes_file}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/* \
            --clobber

      - name: Verify draft GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_ASSETS: ${{ steps.meta.outputs.assets_json }}
        run: |
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft,assets)"
          is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
          [ "${is_draft}" = "true" ] || { echo "Release ${GITHUB_REF_NAME} is not draft before publish" >&2; exit 1; }

          actual_assets="$(printf '%s\n' "${release_json}" | jq -c '[.assets[].name] | sort')"
          expected_assets="$(printf '%s\n' "${EXPECTED_ASSETS}" | jq -c 'sort')"
          [ "${actual_assets}" = "${expected_assets}" ] || {
            echo "Draft release assets do not match expected set" >&2
            echo "expected: ${expected_assets}" >&2
            echo "actual:   ${actual_assets}" >&2
            exit 1
          }

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/*

      - name: Attest SBOM
        if: startsWith(github.ref_name, 'v')
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: dist/${{ steps.meta.outputs.archive }}
          sbom-path: dist/${{ steps.meta.outputs.sbom }}

      - name: Publish draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest=false
          fi

      - name: Verify published GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_json="$(gh release view "${GITHUB_REF_NAME}" --json isDraft,isPrerelease)"
          is_draft="$(printf '%s\n' "${release_json}" | jq -r '.isDraft')"
          is_prerelease="$(printf '%s\n' "${release_json}" | jq -r '.isPrerelease')"
          [ "${is_draft}" = "false" ] || { echo "Release ${GITHUB_REF_NAME} is still draft" >&2; exit 1; }
          [ "${is_prerelease}" = "false" ] || { echo "Release ${GITHUB_REF_NAME} is prerelease" >&2; exit 1; }

          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            latest_tag="$(gh release view --json tagName --jq '.tagName')"
            [ "${latest_tag}" = "${GITHUB_REF_NAME}" ] || { echo "Latest release is ${latest_tag}, expected ${GITHUB_REF_NAME}" >&2; exit 1; }
          fi
