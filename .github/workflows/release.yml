name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package in a release dry run
        required: false
        default: main

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        run: |
          if [ "${EVENT_NAME}" = "push" ]; then
            version="${GITHUB_REF_NAME_VALUE}"
            publish=true
          else
            version="dry-run-$(printf '%s' "${INPUT_REF:-main}" | sed 's#^refs/heads/##; s#^refs/tags/##; s#[^A-Za-z0-9._-]#-#g')"
            publish=false
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "asset_version=${version#v}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"

      - name: Run release validation
        run: go test ./...

      - name: Build release assets
        run: bash ./scripts/build-release-bundle.sh "${{ steps.meta.outputs.version }}" dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: dist/*

      - name: Attest SBOM
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f
        with:
          subject-path: dist/openclerk_${{ steps.meta.outputs.asset_version }}_source.tar.gz
          sbom-path: dist/openclerk_${{ steps.meta.outputs.asset_version }}_sbom.json

      - name: Create or update GitHub Release
        if: steps.meta.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes \
            dist/*
