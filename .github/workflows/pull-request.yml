name: Pull request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  policy-checks:
    name: Policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Verify required repository files
        run: |
          required_files=(
            README.md
            CONTRIBUTING.md
            SECURITY.md
            CODE_OF_CONDUCT.md
            .github/CODEOWNERS
            .github/PULL_REQUEST_TEMPLATE.md
            .github/dependabot.yml
            .github/workflows/pull-request.yml
            .github/workflows/release.yml
          )

          for file in "${required_files[@]}"; do
            test -f "${file}"
          done

      - name: Reject machine-absolute paths in docs
        run: |
          if grep -RInE '/Users/|/home/|[A-Za-z]:\\\\' \
            README.md \
            CONTRIBUTING.md \
            SECURITY.md \
            CODE_OF_CONDUCT.md \
            docs \
            .github/ISSUE_TEMPLATE \
            .github/PULL_REQUEST_TEMPLATE.md; then
            echo "Remove machine-absolute filesystem paths from committed docs."
            exit 1
          fi

  go-checks:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Verify generated clients are up to date
        run: |
          go generate ./...
          if ! git diff --exit-code; then
            echo "Run go generate ./... and commit the generated output."
            exit 1
          fi

      - name: Verify formatting
        run: |
          files="$(git ls-files '*.go')"
          if test -n "$(gofmt -l ${files})"; then
            echo "Run gofmt -w on tracked Go files before pushing."
            gofmt -l ${files}
            exit 1
          fi

      - name: Run tests
        run: go test ./...

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high
